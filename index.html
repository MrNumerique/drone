<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contrôle Drone</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at center, #0d1b2a, #000814);
    font-family: 'Courier New', monospace;
    color: #00ff9c;
  }

  .console {
    width: 90%;
    max-width: 480px;
    background: #001219;
    border: 2px solid #00ff9c;
    border-radius: 10px;
    padding: 30px;
    box-shadow: 0 0 25px rgba(0, 255, 156, 0.5);
    text-align: center;
  }

  h1 {
    font-size: 1.3rem;
    letter-spacing: 2px;
    margin-bottom: 5px;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #5fb3a3;
    margin-bottom: 25px;
  }

  .question {
    font-size: 1rem;
    margin-bottom: 15px;
  }

  input[type="text"] {
    width: 80%;
    padding: 10px;
    font-family: inherit;
    font-size: 1rem;
    background: #000;
    border: 1px solid #00ff9c;
    color: #00ff9c;
    border-radius: 5px;
    text-align: center;
  }

  input[type="text"]:focus {
    outline: none;
    box-shadow: 0 0 10px #00ff9c;
  }

  button {
    display: block;
    margin: 20px auto 0;
    padding: 10px 25px;
    background: #00ff9c;
    color: #001219;
    border: none;
    border-radius: 5px;
    font-family: inherit;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.15s ease;
  }

  button:hover {
    transform: scale(1.05);
  }

  .message {
    margin-top: 15px;
    min-height: 20px;
    font-size: 0.9rem;
  }

  .message.error {
    color: #ff4d4d;
  }

  .message.success {
    color: #00ff9c;
  }

  .video-wrapper {
    margin-top: 20px;
    display: none;
  }

  .video-wrapper.visible {
    display: block;
  }

  .video-wrapper iframe {
    width: 100%;
    aspect-ratio: 16 / 9;
    border: 1px solid #00ff9c;
    border-radius: 5px;
  }

  .blink {
    animation: blink 1.2s infinite;
  }

  @keyframes blink {
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

  <div class="console">
    <h1>🛸 TERMINAL DE CONTRÔLE DRONE</h1>
    <div class="subtitle blink">// EN ATTENTE DE COORDONNÉES //</div>

    <div id="question-screen">
      <div class="question">Où doit se rendre le drone ?</div>
      <input type="text" id="answer" placeholder="Tape ta réponse..." autocomplete="off">
      <button onclick="checkAnswer()">VALIDER</button>
      <div id="message" class="message"></div>
    </div>

    <div id="video-wrapper" class="video-wrapper">
      <iframe id="video-frame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
  </div>

<script>
  const SECRET_ANSWER = "sur le toit";
  const VIDEO_EMBED_URL = "https://www.youtube.com/embed/Z77D5BKjuWg?autoplay=1";

  const EASTER_EGG_CODE = "1529";
  const EASTER_EGG_URL = "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1";

  function normalize(str) {
    return str
      .toLowerCase()
      .normalize("NFD").replace(/[̀-ͯ]/g, "")
      .replace(/[^a-z0-9 ]/g, "")
      .trim()
      .replace(/\s+/g, " ");
  }

  function checkAnswer() {
    const input = document.getElementById("answer");
    const message = document.getElementById("message");
    const userAnswer = normalize(input.value);
    const correctAnswer = normalize(SECRET_ANSWER);
    const easterEgg = normalize(EASTER_EGG_CODE);

    if (userAnswer === correctAnswer) {
      message.textContent = "✔ Coordonnées validées. Lancement du flux vidéo...";
      message.className = "message success";

      document.getElementById("video-frame").src = VIDEO_EMBED_URL;
      document.getElementById("video-wrapper").classList.add("visible");
      input.disabled = true;
      document.querySelector("button").disabled = true;
    } else if (userAnswer === easterEgg) {
      message.textContent = "⚠ Code intercepté sur une fréquence parasite...";
      message.className = "message success";

      document.getElementById("video-frame").src = EASTER_EGG_URL;
      document.getElementById("video-wrapper").classList.add("visible");
    } else {
      message.textContent = "✘ Coordonnées invalides. Réessaie.";
      message.className = "message error";
    }
  }

  document.getElementById("answer").addEventListener("keydown", function(e) {
    if (e.key === "Enter") checkAnswer();
  });
</script>

</body>
</html>
